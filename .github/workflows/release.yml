name: release

# Auto-release on every merge to main. The backend (xentral/agent-hub-labs)
# pins an explicit tag via LIBRARY_VERSION and downloads that tag's tarball, so
# library/skill content only reaches staging/prod once a NEW tag exists. This
# workflow removes the "remember to cut a tag" step: it computes the next
# date-based version (YYYY.MM.PATCH), writes it into manifest.json +
# .claude-plugin/plugin.json, commits `chore(release): X`, tags X, and creates
# a GitHub Release. Renovate in the consumer repo then opens the bump PR.

on:
  push:
    branches: [main]

# Never run two releases at once (back-to-back merges would race on the patch
# number); let each finish before the next starts.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    # Skip the workflow's OWN release commit (else it would re-trigger forever),
    # and honour a `[skip release]` escape hatch in the commit subject.
    if: >-
      ${{ !startsWith(github.event.head_commit.message, 'chore(release):')
          && !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          ym="$(date -u +%Y.%m)"                 # e.g. 2026.06
          latest="$(git tag --list "${ym}.*" --sort=-version:refname | head -1)"
          if [ -n "$latest" ]; then
            patch="${latest##*.}"                 # trailing number of the tag
            next="${ym}.$((patch + 1))"
          else
            next="${ym}.1"                        # first release this month
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Bump version files
        run: |
          python3 - "${{ steps.ver.outputs.version }}" <<'PY'
          import json, sys
          v = sys.argv[1]
          for p in ("manifest.json", ".claude-plugin/plugin.json"):
              with open(p) as f:
                  d = json.load(f)
              d["version"] = v
              with open(p, "w") as f:
                  json.dump(d, f, indent=2)
                  f.write("\n")
          PY

      - name: Commit, tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json .claude-plugin/plugin.json
          git commit -m "chore(release): ${v}"
          git tag "$v"
          git push origin HEAD:main
          git push origin "$v"
          gh release create "$v" --title "$v" --generate-notes
